version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/services/openfang"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/apps/dashboard"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/services/paperclip"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

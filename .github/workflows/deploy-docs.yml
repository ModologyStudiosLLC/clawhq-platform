name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - '**/*.mdx'
      - 'mint.json'
      - 'docs.json'
      - 'images/**'

jobs:
  deploy:
    name: Deploy to Mintlify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mintlify CLI
        run: npm install -g mintlify@latest

      - name: Deploy docs
        run: mintlify deploy
        env:
          MINTLIFY_API_KEY: ${{ secrets.MINTLIFY_API_KEY }}

apiVersion: paperclip.ai/v1
kind: AgentPack
metadata:
  name: devops-infrastructure
  displayName: "DevOps & Infrastructure Pack"
  description: "Incident responder, deployment automator, and cloud cost optimizer. Keep systems up and bills down."
  channel: slack,discord
  tags: [devops, infrastructure, incident-response, cloud]

# ── Agents ────────────────────────────────────────────────────────────────────

agents:

  - id: incident-responder
    name: "Incident Responder"
    description: "Triages production incidents, determines severity and blast radius, generates mitigation steps, and drafts a postmortem template — fast."
    trigger:
      - type: webhook
        event: monitoring.alert-fired
      - type: channel
        keywords: ["incident", "p0", "p1", "system down", "alert fired", "something's broken"]
    task: |
      You are an on-call engineer triaging a production incident. Speed and precision matter — this is live production.

      For the incident or alert provided, produce a structured triage immediately:

      **1. What's Broken and Blast Radius**
      What service or component is affected. What user-facing functionality is impacted. Estimated percentage of users or requests affected. Any downstream systems that depend on this service.

      **2. Severity**
      Assign P0, P1, or P2 with a one-line justification.
      - P0: Complete outage or data loss risk — all hands
      - P1: Major degradation, significant user impact — immediate response
      - P2: Partial or intermittent degradation — urgent but not all hands

      **3. Immediate Mitigation Steps**
      Numbered, specific actions to take right now to stop the bleeding or restore service. Include actual commands or steps, not general advice. Start with the fastest path to mitigation, then stabilization.

      **4. Who to Page**
      Based on the affected system, who should be looped in: on-call owner, service owner, escalation path. If team structure isn't known, list the role type (e.g. "DB lead", "infra on-call").

      **5. Postmortem Template**
      Draft a postmortem stub with: incident title, severity, detected at, resolved at (placeholder), timeline (placeholder rows), root cause (TBD), contributing factors (TBD), action items (TBD). Ready to fill in during/after the incident.

      Do not pad. Do not add caveats. Be fast and specific.
    tools: [web_search, exec, github]
    model: anthropic/claude-sonnet-4-6

  - id: deployment-automator
    name: "Deployment Automator"
    description: "Generates a deployment checklist, rollback plan, and smoke tests specific to the PR or change being shipped."
    trigger:
      - type: webhook
        event: github.pr-merged
      - type: channel
        keywords: ["deploy", "ship this", "deployment checklist", "ready to release"]
    task: |
      You are a senior engineer leading a production deployment.

      For the PR or change provided, produce a deployment runbook specific to what is being shipped:

      **Pre-Deploy Checklist**
      Everything that must be verified or completed before the deploy begins:
      - Database migrations required? List them with order-of-operations notes.
      - Config or environment variable changes? List each with the expected value.
      - Feature flags to enable or disable? List them with the intended state.
      - Dependent service changes or version requirements?
      - Rollback plan confirmed?

      **Deployment Sequence**
      Step-by-step deployment procedure with rollback criteria at each step. For each step: what you're doing, how you verify it succeeded, and under what condition you roll back before proceeding.

      **Smoke Tests**
      Specific commands or URLs to hit immediately after deploy to verify the key paths affected by this change are working. Include expected outputs.

      **Post-Deploy Health Checks**
      What to monitor for the first 15-30 minutes post-deploy. Error rate thresholds, latency benchmarks, key metrics to watch. Include the specific dashboards or log queries to run.

      **Rollback Procedure**
      Exact steps to roll back if something goes wrong after deploy. Include any migration reversals, flag resets, or cache flushes required.

      Tailor everything to the specific PR/change. Generic checklists are not useful.
    tools: [github, exec]
    model: anthropic/claude-sonnet-4-6

  - id: cloud-cost-optimizer
    name: "Cloud Cost Optimizer"
    description: "Weekly review of cloud spend identifying top cost drivers, idle resources, and rightsizing opportunities with estimated monthly savings attached to each."
    trigger:
      - type: cron
        schedule: "0 9 * * 1"  # Every Monday 9am — weekly cost review
      - type: channel
        keywords: ["cloud costs", "AWS bill", "optimize spend", "unused resources", "cost report"]
    task: |
      You are a FinOps engineer reviewing cloud infrastructure spend for the week.

      Cloud provider: use CLOUD_PROVIDER env var (aws/gcp/azure). Default to AWS if not set.

      Produce a cost optimization report:

      **Top 5 Cost Drivers This Period**
      The five services or resources consuming the most spend. For each: service name, estimated monthly cost, whether this is expected/budgeted or anomalous.

      **Unused and Idle Resources**
      Specific resources that are running but not earning their keep:
      - EC2/compute instances that are stopped but not terminated (paying for EBS)
      - Unattached volumes (EBS, persistent disks)
      - Idle load balancers with no active targets
      - Snapshots older than 90 days that may no longer be needed
      - Reserved instances or savings plans that are underutilized
      For each: resource identifier if available, estimated monthly waste.

      **Rightsizing Recommendations**
      Instances or services that appear over-provisioned based on utilization. For each: current size, recommended size, estimated monthly savings.

      **Quick Wins** (can be done this week, low risk)
      Specific actions that require minimal engineering effort and deliver immediate savings. Attach estimated monthly savings to each.

      **Architectural Changes** (require planning)
      Longer-term optimizations that would deliver material savings but require design or migration work. Attach estimated monthly savings to each.

      Attach a dollar estimate to every recommendation. A recommendation without a number is not actionable.
    tools: [exec, web_search]
    model: anthropic/claude-haiku-4-5

# ── Delivery ──────────────────────────────────────────────────────────────────

delivery:
  channels:
    - type: slack
      # Set DEVOPS_SLACK_CHANNEL in your .env
      channel: "${DEVOPS_SLACK_CHANNEL}"
    - type: discord
      # Set DEVOPS_DISCORD_CHANNEL_ID in your .env
      channelId: "${DEVOPS_DISCORD_CHANNEL_ID}"

# ── Setup ─────────────────────────────────────────────────────────────────────
# 1. Set DEVOPS_SLACK_CHANNEL or DEVOPS_DISCORD_CHANNEL_ID in .env
# 2. Set CLOUD_PROVIDER in .env — one of: aws, gcp, azure (default: aws)
# 3. Set TZ in .env for correct cron scheduling (e.g. TZ=America/New_York)
# 4. For incident-responder: configure your monitoring tool (PagerDuty, Datadog,
#    Grafana, etc.) to POST alert events to your Paperclip webhook endpoint
# 5. For deployment-automator: add your GitHub repo webhook in repo Settings → Webhooks
#    Payload URL: https://your-clawhq-domain.com/api/webhooks/github
#    Events: Pull requests (merged)
# 6. Deploy: docker compose up -d

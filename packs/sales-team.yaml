apiVersion: paperclip.ai/v1
kind: AgentPack
metadata:
  name: sales-team
  displayName: "Sales Team Pack"
  description: "Lead researcher, outreach drafter, and CRM note taker for sales teams. Paste a name or company and your agents handle the rest."
  channel: slack,telegram
  tags: [sales, crm, outreach, leads]

agents:

  - id: lead-researcher
    name: "Lead Researcher"
    description: "Given a name, company, or LinkedIn URL, produces a structured research brief with context, signals, and talking points."
    trigger:
      - type: channel
        keywords: ["research", "look up", "who is", "tell me about"]
    task: |
      You are a sales researcher preparing a brief before an outreach or meeting.

      Given the person or company provided, produce a research brief:
      1. Who they are — role, background, tenure
      2. Company overview — size, industry, recent news, funding stage
      3. Likely pain points — based on their role and company stage
      4. Relevant signals — job postings, press, product launches, leadership changes
      5. Conversation hooks — 2-3 specific, non-generic openers
      6. LinkedIn URL and company website if found

      Be specific and actionable. Skip anything that isn't useful in a sales conversation.
    tools: [web_search, browser]
    model: anthropic/claude-sonnet-4-6

  - id: outreach-drafter
    name: "Outreach Drafter"
    description: "Writes a personalized cold outreach message using the research brief. Output is ready to send — no filler, no generic openers."
    trigger:
      - type: channel
        keywords: ["draft outreach", "write an email to", "cold email", "first message to"]
    task: |
      You are a sales copywriter writing a cold outreach email or LinkedIn message.

      Rules:
      - First line must be specific to them — not a compliment, a real observation
      - No "I hope this finds you well", no "I came across your profile"
      - State the problem you solve in one sentence, clearly
      - Value proposition in one sentence — what they get, not what you do
      - One clear CTA — a question or a specific ask, not "let me know if you're interested"
      - 80-120 words total. If you can't say it in 120 words, cut it.

      Tone: direct, peer-to-peer, not salesy. Like one founder messaging another.
    tools: [web_search]
    model: anthropic/claude-sonnet-4-6

  - id: crm-note-taker
    name: "CRM Note Taker"
    description: "Takes raw meeting notes or voice transcripts and produces a structured CRM-ready summary with next steps."
    trigger:
      - type: channel
        keywords: ["log this meeting", "update CRM", "summarize this call", "meeting notes"]
    task: |
      You are a sales assistant turning raw meeting notes into a CRM update.

      From the notes or transcript provided, produce:
      1. Meeting summary (3-4 sentences — what was discussed, what matters)
      2. Key information gathered (budget, timeline, decision maker, pain points)
      3. Objections raised and how they were addressed
      4. Deal stage assessment (Discovery / Qualified / Proposal / Negotiation / Closed)
      5. Next steps — specific actions with owners and deadlines if mentioned
      6. Follow-up email subject line suggestion

      Format this so it can be copy-pasted directly into a CRM note field.
    tools: []
    model: anthropic/claude-haiku-4-5

delivery:
  channels:
    - type: slack
      channel: "${SALES_SLACK_CHANNEL}"
    - type: telegram
      chatId: "${SALES_TELEGRAM_CHAT_ID}"

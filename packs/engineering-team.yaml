apiVersion: paperclip.ai/v1
kind: AgentPack
metadata:
  name: engineering-team
  displayName: "Engineering Team Pack"
  description: "PR reviewer, release notes writer, and bug triage agent for engineering teams. Joins your Slack or Discord and handles the toil engineers hate."
  channel: discord,slack
  tags: [engineering, devops, github, code-review]

# ── Agents ────────────────────────────────────────────────────────────────────

agents:

  - id: pr-reviewer
    name: "PR Reviewer"
    description: "Reviews pull request diffs, flags issues, and posts a structured review comment directly to GitHub or your team channel."
    trigger:
      - type: webhook
        event: github.pr-status-changed
      - type: channel
        keywords: ["review this PR", "review PR", "check this PR"]
    task: |
      You are a senior software engineer performing a pull request review.

      Given the PR diff and context provided, produce a structured review covering:
      1. Summary of what this PR does (2-3 sentences)
      2. Potential issues — bugs, edge cases, missing error handling
      3. Code quality observations — readability, naming, unnecessary complexity
      4. Security concerns if any (SQL injection, exposed secrets, auth gaps)
      5. Verdict: Approve / Request Changes / Needs Discussion

      Be direct and specific. Reference line numbers when relevant. Don't pad.
    tools: [github, web_search]
    model: anthropic/claude-sonnet-4-6

  - id: release-notes-writer
    name: "Release Notes Writer"
    description: "Drafts a human-readable changelog from git history between two refs. Posts to your channel or opens a PR to update CHANGELOG.md."
    trigger:
      - type: channel
        keywords: ["write release notes", "draft changelog", "release notes for"]
      - type: cron
        schedule: "0 9 * * 5"  # Every Friday 9am — weekly release digest
    task: |
      You are a technical writer creating release notes for developers and non-technical stakeholders.

      Given the git log between the two refs provided, produce release notes with:
      1. Version and date header
      2. Breaking Changes section (if any — highlight prominently)
      3. New Features — grouped by area, written for end users not engineers
      4. Bug Fixes — concise, one line each
      5. Internal / Developer Changes — dependency updates, refactors, CI changes

      Write Features and Bug Fixes as if explaining to a user, not a developer.
      Internal Changes can be brief and technical.
    tools: [github, exec]
    model: anthropic/claude-sonnet-4-6

  - id: bug-triage
    name: "Bug Triage"
    description: "Classifies new GitHub issues, assigns severity, checks for duplicates, and posts a structured triage summary to the team channel."
    trigger:
      - type: webhook
        event: github.issue-opened
      - type: channel
        keywords: ["triage this", "classify issue", "is this a bug"]
    task: |
      You are an engineering team lead triaging an incoming bug report.

      For the issue provided, produce a triage report:
      1. Issue type: Bug / Feature Request / Question / Invalid / Duplicate
      2. Severity: Critical / High / Medium / Low — with one-line justification
      3. Affected area: Which part of the system does this touch?
      4. Reproduction likelihood: Can this be reproduced easily based on the report?
      5. Suggested assignee or team area
      6. Duplicate check: Does this match any recent open issues?
      7. Recommended next step (close, needs more info, assign, hotfix, etc.)

      Be concise. One paragraph max per section.
    tools: [github, web_search]
    model: anthropic/claude-haiku-4-5

# ── Delivery ──────────────────────────────────────────────────────────────────

delivery:
  channels:
    - type: discord
      # Set ENGINEERING_DISCORD_CHANNEL_ID in your .env
      channelId: "${ENGINEERING_DISCORD_CHANNEL_ID}"
    - type: slack
      # Set ENGINEERING_SLACK_CHANNEL in your .env
      channel: "${ENGINEERING_SLACK_CHANNEL}"

# ── Setup ─────────────────────────────────────────────────────────────────────
# 1. Add your GitHub repo webhook in repo Settings → Webhooks
#    Payload URL: https://your-clawhq-domain.com/api/webhooks/github
#    Events: Pull requests, Issues
# 2. Set ENGINEERING_DISCORD_CHANNEL_ID or ENGINEERING_SLACK_CHANNEL in .env
# 3. Deploy: docker compose up -d

apiVersion: paperclip.ai/v1
kind: AgentPack
metadata:
  name: ecommerce
  namespace: clawhq
  version: "1.0.0"
  description: >
    AI agents for e-commerce brands and stores. Automates product copy,
    review responses, competitor pricing, inventory alerts, and cart recovery
    messaging — turning operational work into revenue.

spec:
  agents:
    - ref: clawhq://product-writer
      role: copy
      priority: 1
      config:
        model: claude-sonnet-4-6
        tools: [web_search, doc_writer]
        temperature: 0.6
        instructions: |
          You are a Product Copywriter. Write conversion-optimized product descriptions
          for e-commerce. Structure: attention-grabbing title, 2-3 sentence hook,
          benefit-led bullet points (5-7), and a short technical specs section.
          Lead with benefits, not features. Speak to the customer's desired outcome.
          Include SEO keywords naturally. Write separate versions for: PDP (full),
          category page (50 words), and social ads (25 words).

    - ref: clawhq://review-responder
      role: support
      priority: 2
      config:
        model: claude-haiku-4-5
        tools: [doc_writer]
        temperature: 0.3
        instructions: |
          You are a Review Responder. Draft responses to customer reviews — positive
          and negative. For positive reviews: thank specifically, reinforce a brand
          value, invite them back. For negative reviews: acknowledge the issue without
          being defensive, apologize genuinely, offer a concrete resolution, take
          it offline if needed. Never copy-paste generic responses. Keep under 80 words.
          Flag 1-star reviews for urgent human review before posting.

    - ref: clawhq://competitor-pricer
      role: intel
      priority: 3
      config:
        model: claude-haiku-4-5
        tools: [web_search, doc_writer]
        instructions: |
          You are a Competitor Pricing Agent. Monitor competitor prices for a given
          product category. Identify when competitors drop below our price by more
          than 10%, launch promotions, or go out of stock. Summarize findings in a
          daily digest. Flag urgent price threats immediately. Recommend whether to
          match, hold, or bundle to compete.

    - ref: clawhq://inventory-watcher
      role: operations
      priority: 4
      config:
        model: claude-haiku-4-5
        tools: [http_request, doc_writer]
        instructions: |
          You are an Inventory Watcher. Monitor stock levels via API. Alert when
          any SKU drops below reorder threshold. Forecast days-of-stock-remaining
          based on recent sales velocity. Flag slow-moving inventory that hasn't
          sold in 30 days. Generate a weekly inventory health report with
          recommended reorder quantities.

    - ref: clawhq://cart-recovery
      role: retention
      priority: 5
      config:
        model: claude-sonnet-4-6
        tools: [doc_writer]
        temperature: 0.5
        instructions: |
          You are a Cart Recovery Specialist. Write abandoned cart email sequences
          (3 emails: 1h, 24h, 72h after abandonment). Each email should feel personal,
          not automated. Email 1: gentle reminder. Email 2: address common objections
          (shipping, returns, trust). Email 3: urgency + incentive if appropriate.
          Also write SMS versions (under 160 chars) for each. Personalize with
          product name and category.

  pipelines:
    - name: new-product
      trigger: command "new product {product_name}"
      steps:
        - agent: competitor-pricer
          action: "Research competitor pricing and positioning for this product category"
        - agent: product-writer
          action: "Write full product description using competitive intel"
          hitl: true
        - agent: product-writer
          action: "Generate category page and social ad variants"

    - name: daily-review-queue
      trigger: cron "0 9 * * *"
      steps:
        - agent: review-responder
          action: "Draft responses for all unresponded reviews from the last 24 hours"
          hitl: true
          deliver_to: "#customer-success"

    - name: daily-pricing-intel
      trigger: cron "0 7 * * 1-5"
      steps:
        - agent: competitor-pricer
          action: "Monitor competitor prices across our top 20 SKUs and report changes"
          deliver_to: "#pricing"

    - name: inventory-alerts
      trigger: cron "0 8 * * *"
      steps:
        - agent: inventory-watcher
          action: "Check all SKU stock levels and flag anything below reorder threshold"
          deliver_to: "#ops"

    - name: cart-recovery-setup
      trigger: command "cart recovery for {product_category}"
      steps:
        - agent: cart-recovery
          action: "Write 3-email sequence and SMS variants for abandoned carts in this category"
          hitl: true

  settings:
    hitl:
      enabled: true
      human_handles:
        - "Final product copy approval"
        - "Negative review responses before posting"
        - "Pricing decisions"
        - "Inventory reorder authorization"
      ai_handles:
        - "Product description drafts"
        - "Positive review responses"
        - "Competitor monitoring"
        - "Inventory tracking and alerts"
        - "Cart recovery copy drafts"

  metrics:
    - name: "product_descriptions_per_hour"
      target: "10x current rate"
    - name: "review_response_rate"
      target: "100% within 24 hours"
    - name: "cart_recovery_rate"
      target: "> 15% recovered"

# Required env vars: none
# Optional: STORE_URL — your store URL for competitor research context
# Optional: INVENTORY_API_URL — endpoint for stock level checks
# Optional: INVENTORY_API_KEY — auth for inventory API
# Optional: REORDER_THRESHOLD — units, default 50

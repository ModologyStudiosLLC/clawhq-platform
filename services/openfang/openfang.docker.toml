# OpenFang — Docker deployment configuration
# Mounted at /data/config.toml inside the container (OPENFANG_HOME=/data)
#
# IMPORTANT: api_listen and network.listen_addr must be 0.0.0.0 in Docker
# so the dashboard and other services on the clawhq bridge network can reach
# the API. 127.0.0.1 (loopback) is unreachable from other containers.

# HTTP API — listen on all interfaces inside the container
api_listen = "0.0.0.0:4200"

# No auth token required within the private Docker network.
# If you expose OpenFang publicly, set an api_key here.
# api_key = ""

[default_model]
provider = "anthropic"
model = "claude-sonnet-4-6"
api_key_env = "ANTHROPIC_API_KEY"

[memory]
decay_rate = 0.05

[network]
# OFP peer-to-peer listen address — must be a DIFFERENT port from api_listen.
# Using 4201 to avoid a double-bind crash on startup.
listen_addr = "0.0.0.0:4201"

# Session compaction: keep context under control for long-running agents
[compaction]
threshold = 80
keep_recent = 20
max_summary_tokens = 1024

# Usage tracking in agent responses
# usage_footer = "Full"

# ── Discord notifications (send-only — bot token shared with OpenClaw) ───────
# send_only = true means OpenFang uses the Discord REST API for outbound sends
# but does NOT open a Gateway WebSocket, so OpenClaw keeps its Gateway session.
# Agents can call: channel_send(channel="discord", message="Task done!")
[channels.discord]
send_only = true
default_channel_id = "1485040875838111866"

# ── ClawHQ default agent roster ──────────────────────────────────────────────
# These agents ship pre-installed in the OpenFang Docker image at
# /opt/openfang/agents/. They are loaded automatically on first boot.
# To disable one, set autostart = false for that agent via the API or dashboard.
#
# Default active agents (maps to the ClawHQ skill set):
#   assistant      — General-purpose assistant (always-on)
#   researcher     — Web research and synthesis
#   email-assistant — Email triage, drafting, scheduling
#   doc-writer     — Documents, reports, summaries
#   coder          — Code generation and review
#   analyst        — Data and business analysis
#   social-media   — Social content and strategy
#   planner        — Task planning and automation
#
# Full agent library (30+ total) lives at /opt/openfang/agents/ in the image.

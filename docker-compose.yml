name: clawhq

services:

  # ─── Database ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: clawhq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: clawhq
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawhq -d clawhq"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - clawhq

  # ─── OpenClaw — agent gateway & dashboard sessions ────────────────────────
  openclaw:
    build:
      context: ./services/openclaw
      dockerfile: Dockerfile
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      TZ: ${TZ:-UTC}
    volumes:
      - openclaw-config:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    # Not exposed publicly — Caddy proxies the dashboard which calls OpenClaw internally
    expose:
      - "18789"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - clawhq
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]

  # ─── OpenFang — autonomous agent OS (Rust) ────────────────────────────────
  openfang:
    build:
      context: ./services/openfang
      dockerfile: Dockerfile
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Channel tokens omitted — Hermes owns all channel connections.
      # OpenFang is the tool execution and agent runtime backend.
    volumes:
      - openfang-data:/data
      # Mount Docker-specific config so OpenFang binds to 0.0.0.0 (required
      # for the dashboard to reach it across the Docker bridge network).
      - ./services/openfang/openfang.docker.toml:/data/config.toml:ro
    # Restrictive seccomp profile — blocks ptrace, mount, namespace syscalls
    security_opt:
      - seccomp:./services/openfang/security/seccomp-agent.json
      - no-new-privileges:true
    # Not exposed publicly — internal only
    expose:
      - "4200"   # HTTP API
      - "4201"   # OFP peer-to-peer network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:4200/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - clawhq

  # ─── Paperclip — agent orchestration & org charts ─────────────────────────
  paperclip:
    build:
      context: ./services/paperclip
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://clawhq:${POSTGRES_PASSWORD}@postgres:5432/clawhq
      PORT: "3100"
      SERVE_UI: "false"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: ${CLAWHQ_PUBLIC_URL:-http://localhost:3500}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      # Bridge URL — Paperclip HTTP adapter calls this to trigger OpenFang agents
      # Configure workflow HTTP actions to POST to:
      #   http://dashboard:3500/api/bridge/agent-task
      #   body: { "task": "...", "agentProfile": "research" }
      CLAWHQ_BRIDGE_URL: http://dashboard:3500
    volumes:
      - paperclip-data:/paperclip
    # Not exposed publicly — internal only
    expose:
      - "3100"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3100/api/companies"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - clawhq

  # ─── Hermes Agent — Nous Research (the brain) ─────────────────────────────
  # Hermes is the primary conversational agent. Users interact with it
  # directly on Discord, Telegram, and Slack. It has persistent memory,
  # skills, and multi-provider LLM support.
  hermes:
    build:
      context: ./services/hermes
      dockerfile: Dockerfile
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Hermes owns the primary channel connections. Each token is prefixed
      # HERMES_* to keep them distinct from any other service's tokens.
      TELEGRAM_BOT_TOKEN: ${HERMES_TELEGRAM_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN: ${HERMES_DISCORD_BOT_TOKEN:-}
      SLACK_BOT_TOKEN: ${HERMES_SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${HERMES_SLACK_APP_TOKEN:-}
      HERMES_MODEL: ${HERMES_MODEL:-anthropic/claude-sonnet-4-6}
      HERMES_HOME: /opt/data
      # Bridge URLs — Hermes uses these to delegate to OpenFang and Paperclip
      OPENFANG_INTERNAL_URL: http://openfang:4200
      PAPERCLIP_INTERNAL_URL: http://paperclip:3100
      # Clawhip — fire events (session.started, session.finished, etc.)
      CLAWHIP_INTERNAL_URL: http://clawhip:25294
    volumes:
      - hermes-data:/opt/data
    # Not exposed publicly — dashboard queries via internal URL
    expose:
      - "4300"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4300/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - clawhq

  # ─── ClawHQ Dashboard ─────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_OPENCLAW_URL: ${CLAWHQ_PUBLIC_URL:-http://localhost:3500}/api/openclaw
        NEXT_PUBLIC_PAPERCLIP_URL: ${CLAWHQ_PUBLIC_URL:-http://localhost:3500}/api/paperclip
        NEXT_PUBLIC_OPENFANG_URL: ${CLAWHQ_PUBLIC_URL:-http://localhost:3500}/api/openfang
        NEXT_PUBLIC_HERMES_URL: ${CLAWHQ_PUBLIC_URL:-http://localhost:3500}/api/hermes
    environment:
      OPENCLAW_INTERNAL_URL: http://openclaw:18789
      PAPERCLIP_INTERNAL_URL: http://paperclip:3100
      OPENFANG_INTERNAL_URL: http://openfang:4200
      HERMES_INTERNAL_URL: http://hermes:4300
      CLAWHIP_INTERNAL_URL: http://clawhip:25294
      DOCKER_PROXY_URL: http://docker-proxy:2375
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      NEXTAUTH_URL: ${CLAWHQ_PUBLIC_URL:-http://localhost:3500}
    # Not exposed publicly — Caddy proxies it
    expose:
      - "3500"
    depends_on:
      openclaw:
        condition: service_started
      openfang:
        condition: service_healthy
      paperclip:
        condition: service_healthy
      hermes:
        condition: service_started
    restart: unless-stopped
    networks:
      - clawhq

  # ─── Clawhip — event notification router (Git/GitHub/tmux → Discord/Slack) ─
  # Monitors Git commits, GitHub events, tmux sessions, and agent lifecycle
  # events — routes them to Discord or Slack. Other services reach it at
  # http://clawhip:25294. Fire events with: clawhip send --channel <id> --message "..."
  clawhip:
    build:
      context: ./services/clawhip
      dockerfile: Dockerfile
    environment:
      # Discord — use a dedicated bot token (separate from Hermes)
      CLAWHIP_DISCORD_TOKEN: ${CLAWHIP_DISCORD_TOKEN:-}
      CLAWHIP_DISCORD_CHANNEL_ID: ${CLAWHIP_DISCORD_CHANNEL_ID:-}
      # Fallback: webhook URL instead of bot token (only one needed)
      CLAWHIP_DISCORD_WEBHOOK: ${CLAWHIP_DISCORD_WEBHOOK:-}
      # Slack (optional)
      CLAWHIP_SLACK_WEBHOOK: ${CLAWHIP_SLACK_WEBHOOK:-}
      # GitHub event source (optional — PR/issue notifications)
      CLAWHIP_GITHUB_TOKEN: ${CLAWHIP_GITHUB_TOKEN:-}
      CLAWHIP_GITHUB_REPOS: ${CLAWHIP_GITHUB_REPOS:-}
      CLAWHIP_LOG_LEVEL: ${CLAWHIP_LOG_LEVEL:-info}
    volumes:
      - clawhip-data:/var/lib/clawhip
    expose:
      - "25294"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:25294/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - clawhq

  # ─── Docker Socket Proxy — scoped Docker API access for Services UI ─────────
  # Exposes a SUBSET of the Docker API over TCP with an explicit allowlist.
  # The dashboard never mounts the raw Docker socket — it talks to this proxy.
  # Profile: services-ui (opt-in, not started by default)
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    profiles: [services-ui]
    environment:
      CONTAINERS: 1
      INFO: 1
      EVENTS: 1
      POST: 1
      AUTH: 0
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      SERVICES: 0
      TASKS: 0
      EXEC: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "2375"
    restart: unless-stopped
    networks:
      - clawhq

  # ─── Tailscale — zero-config VPN tunnel (opt-in) ────────────────────────────
  # Gives the ClawHQ stack a Tailscale IP so you can reach it from any device
  # on your tailnet without opening public ports. Start with:
  #   docker compose --profile tunnel-ts up -d
  # Then run: docker compose exec tailscale tailscale up --authkey=<TSKEY>
  tailscale:
    image: tailscale/tailscale:latest
    profiles: [tunnel-ts]
    hostname: clawhq
    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTHKEY:-}
      TS_EXTRA_ARGS: ${TAILSCALE_EXTRA_ARGS:---advertise-tags=tag:clawhq}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host          # must use host mode to proxy into the clawhq bridge
    restart: unless-stopped

  # ─── Cloudflare Tunnel — public HTTPS via Cloudflare Zero Trust ─────────────
  # Exposes the dashboard over a Cloudflare Tunnel — no open ports required.
  # Start with:  docker compose --profile tunnel-cf up -d
  # Create a tunnel token at dash.cloudflare.com → Zero Trust → Tunnels.
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: [tunnel-cf]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in .env to use Cloudflare Tunnel}
    restart: unless-stopped
    networks:
      - clawhq

  # ─── Caddy — HTTPS reverse proxy ──────────────────────────────────────────
  # Terminates TLS using Let's Encrypt. Set CLAWHQ_DOMAIN in .env to your
  # public domain (e.g. clawhq.example.com). Caddy obtains and renews the
  # certificate automatically — no manual cert management needed.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      CLAWHQ_DOMAIN: ${CLAWHQ_DOMAIN:?Set CLAWHQ_DOMAIN in .env (e.g. clawhq.example.com)}
    depends_on:
      - dashboard
    restart: unless-stopped
    networks:
      - clawhq

volumes:
  pgdata:
  openclaw-config:
  openclaw-workspace:
  openfang-data:
  paperclip-data:
  hermes-data:
  clawhip-data:
  caddy-data:
  caddy-config:
  tailscale-state:
  portainer-data:

networks:
  clawhq:
    driver: bridge
